CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# nRF board library
CONFIG_DK_LIBRARY=y

# Enable OpenThread
CONFIG_OPENTHREAD=y

# Enable CoAP utils and CoAP protocol
CONFIG_COAP=y
CONFIG_COAP_UTILS=y

# Generic networking options
CONFIG_NETWORKING=y

# Enable OpenThread CoAP support API
CONFIG_OPENTHREAD_COAP=y

# L2 OpenThread enabling
CONFIG_NET_L2_OPENTHREAD=y

# Network shell
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_SHELL_ARGC_MAX=26
CONFIG_SHELL_CMD_BUFF_SIZE=416

# Same network Master Key for client and server
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_PANID=4660
CONFIG_OPENTHREAD_XPANID="11:11:11:11:22:22:22:22"
CONFIG_OPENTHREAD_CHANNEL=15
CONFIG_MBEDTLS_SHA1_C=n
CONFIG_FPU=y

# Increase main stack size to meet networking requirements
CONFIG_MAIN_STACK_SIZE=4096

# Set product string for USB device
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="OpenThread CoAP Client Button"

# Increase Settings storage size
# CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000

# Network sockets
# CONFIG_NET_SOCKETS=y
# CONFIG_ZVFS_POLL_MAX=4

# # 启用 OpenThread 的 CoAP Secure 支持
# CONFIG_OPENTHREAD_COAP_SECURE=y
# # 允许使用预共享密钥 (PSK) 或 X.509 证书
# CONFIG_OPENTHREAD_MBEDTLS=y
# # 增加堆栈大小，因为 DTLS 握手比较耗内存
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
